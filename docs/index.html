      content="initial-scale=1, viewport-fit=cover, width=device-width"
    />
    <!-- Apply the saved theme before first paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem("kanjii:theme") || "dark";
          var light =
            p === "light" ||
            (p === "system" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: light)").matches);
          document.documentElement.dataset.theme = light ? "light" : "dark";
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/kanjii/favicon.svg" />
    <link rel="apple-touch-icon" href="/kanjii/apple-touch-icon.png" />
